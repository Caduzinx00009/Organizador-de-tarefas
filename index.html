<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Organizador de Tarefas</title>
</head>
<body>

    <h1>Minha Lista de Tarefas</h1>
    <p id="contador">Tarefas: 0</p>

    <input type="text" id="tarefa" placeholder="Digite uma tarefa">
    <input type="date" id="prazo">
    <button onclick="adicionarTarefa()">Adicionar</button>

    <ul id="lista"></ul>

    <script>
        function adicionarTarefa() {
            let tarefa = document.getElementById("tarefa").value;
            let prazo = document.getElementById("prazo").value;
            let lista = document.getElementById("lista");

            if (tarefa.trim() === "") {
                alert("Digite uma tarefa!");
                return;
            }

            let item = document.createElement("li");

            // Se não escolher prazo, mostra "sem prazo"
            let textoPrazo = prazo ? prazo : "sem prazo";
item.innerHTML = `
    ${tarefa} — Prazo: ${textoPrazo}
    <button onclick="marcarConcluido(this)">Concluir</button>
    <button onclick="excluirTarefa(this)">Excluir</button>
`;
            lista.appendChild(item);
salvarTarefas();
atualizarContador();
            document.getElementById("tarefa").value = "";
            document.getElementById("prazo").value = "";
        }
        function marcarConcluido(botao) {
    let item = botao.parentElement;
    item.style.backgroundColor = "lightgreen";
    botao.innerText = "Concluído";
    botao.disabled = true;
    salvarTarefas();
}
function excluirTarefa(botao) {
    let item = botao.parentElement;
    item.remove();
    salvarTarefas();
    atualizarContador();
}
function salvarTarefas() {
    localStorage.setItem("tarefas", document.getElementById("lista").innerHTML);
}

function carregarTarefas() {
    let salvo = localStorage.getItem("tarefas");
    if (salvo) {
        document.getElementById("lista").innerHTML = salvo;
        atualizarContador();
    }
}

// carrega automaticamente quando abrir a página
carregarTarefas();

function atualizarContador() {
    let quantidade = document.querySelectorAll("#lista li").length;
    document.getElementById("contador").innerText = "Tarefas: " + quantidade;
}
    </script>
    

</body>
</html>
